# 词典同步：定期从 OpenCC 重生词表，有变更则开 PR
name: Dictionary

on:
  schedule:
    # 每周一 03:17 UTC
    - cron: "17 3 * * 1"
  workflow_dispatch:
    inputs:
      ref:
        description: "OpenCC git ref (branch/tag/sha)"
        required: false
        default: "master"
        type: string

concurrency:
  group: dictionary-sync
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Resolve OpenCC ref
        id: ref
        run: |
          REF="${{ github.event.inputs.ref }}"
          if [ -z "$REF" ]; then
            REF="master"
          fi
          echo "value=$REF" >> "$GITHUB_OUTPUT"
          echo "Using OpenCC ref: $REF"

      - name: Regenerate dictionaries
        env:
          OPENCC_REF: ${{ steps.ref.outputs.value }}
        run: |
          go run ./scripts/gendict -ref "$OPENCC_REF" -out-root . -retries 4
          test -f dict/SOURCE.json
          test -f dict/chars.tsv
          test -f dict/phrases.tsv
          cmp -s dict/chars.tsv table/chars.tsv
          cmp -s dict/phrases.tsv table/phrases.tsv
          python3 - <<'PY'
          import json
          meta = json.load(open("dict/SOURCE.json"))
          chars = meta["counts"]["chars"]
          phrases = meta["counts"]["phrases"]
          assert chars >= 1000, chars
          assert phrases >= 200, phrases
          print(f"counts ok: chars={chars} phrases={phrases}")
          PY

      - name: Detect changes
        id: changes
        run: |
          # 仅以 TSV 映射判断是否需要 PR（SOURCE.json 仅在内容变化时更新）
          if git diff --quiet -- \
              dict/chars.tsv dict/phrases.tsv \
              table/chars.tsv table/phrases.tsv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No dictionary mapping changes."
            git checkout -- dict table 2>/dev/null || true
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Dictionary files changed:"
            git diff --stat -- dict table
          fi

      - name: Test regenerated tables
        if: steps.changes.outputs.changed == 'true'
        run: |
          go vet ./...
          go test ./... -count=1

      - name: Build PR body
        if: steps.changes.outputs.changed == 'true'
        id: body
        run: |
          COMMIT=$(python3 -c 'import json; print(json.load(open("dict/SOURCE.json"))["commit"])')
          SHORT=${COMMIT:0:12}
          COUNTS=$(python3 -c 'import json; c=json.load(open("dict/SOURCE.json"))["counts"]; print(f"chars={c.get(\"chars\",0)} phrases={c.get(\"phrases\",0)}")')
          GEN_AT=$(python3 -c 'import json; print(json.load(open("dict/SOURCE.json"))["generated_at"])')
          REF="${{ steps.ref.outputs.value }}"
          {
            echo "title=chore 🔧: 同步 OpenCC 词典 ${SHORT}"
            echo "commit=$COMMIT"
            echo "short=$SHORT"
            echo "counts=$COUNTS"
            echo "generated_at=$GEN_AT"
          } >> "$GITHUB_OUTPUT"

          cat > /tmp/pr-body.md <<EOF
          ## 自动词典同步

          从 [OpenCC](https://github.com/BYVoid/OpenCC) 重新生成单向 t2s 词表。

          | 项 | 值 |
          |---|---|
          | OpenCC ref | \`${REF}\` |
          | OpenCC commit | [\`${SHORT}\`](https://github.com/BYVoid/OpenCC/commit/${COMMIT}) |
          | 生成时间 (UTC) | \`${GEN_AT}\` |
          | 规模 | \`${COUNTS}\` |

          ### 变更范围
          - \`dict/chars.tsv\` / \`dict/phrases.tsv\`
          - \`table/chars.tsv\` / \`table/phrases.tsv\`（嵌入副本）
          - \`dict/SOURCE.json\` / \`dict/NOTICE\`

          ### 校验
          - \`go vet ./...\`
          - \`go test ./... -count=1\`
          - \`dict/*\` 与 \`table/*\` 内容一致

          ### 说明
          - 仅做 **繁→简** 词表维护，不引入双向/多地区输出配置
          - 多候选词条保留第一候选
          - 台/港异体字以 reverse variants 补洞，不覆盖 \`TSCharacters\`
          - 请人工扫一眼 diff 后合并；合并后如需发版再打 tag

          > 由 **Dictionary** workflow 创建，可手动 Run workflow 重跑。
          EOF

      - name: Create or update Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore 🔧: 同步 OpenCC 词典 ${{ steps.body.outputs.short }}

            来源: BYVoid/OpenCC@${{ steps.body.outputs.commit }}
          branch: chore/dictionary-sync
          delete-branch: true
          title: ${{ steps.body.outputs.title }}
          body-path: /tmp/pr-body.md
          labels: |
            dictionaries
            automated
          add-paths: |
            dict/**
            table/chars.tsv
            table/phrases.tsv
