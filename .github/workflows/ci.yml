# push / PR 时自动跑：代码检查 + 单元测试 + 演示 + 基准冒烟
name: 代码测试

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: 检查与测试
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        go: ["1.26.x"]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: 静态检查 go vet
        run: go vet ./...

      - name: 单元测试
        run: go test ./... -count=1

      - name: 构建 CLI 并跑演示
        run: |
          go build -o /tmp/zhconv ./cmd/zhconv
          /tmp/zhconv -demo

      - name: 性能基准冒烟
        run: go test -bench=BenchmarkToSimplified -benchtime=200ms -count=1 .
