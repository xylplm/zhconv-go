# 推送 v* 标签自动发版；也可手动指定「已有标签」重跑/补发
name: 版本发布

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的已有标签（必须已存在，如 v0.1.2）"
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    name: 构建并发布
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 解析版本号
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          TAG="${TAG#refs/tags/}"
          if [[ ! "$TAG" =~ ^v[0-9] ]]; then
            echo "标签格式应为 v 开头的语义化版本，例如 v0.1.2，当前: $TAG"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "发布标签: ${TAG}"

      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 手动触发时检出指定标签，避免误用 main 上未打 tag 的代码
          ref: ${{ steps.meta.outputs.tag }}

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: 发布前测试
        run: |
          go vet ./...
          go test ./... -count=1

      - name: 交叉编译多平台 CLI
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./scripts/build-release.sh
          bash ./scripts/build-release.sh "${{ steps.meta.outputs.tag }}"

      - name: 生成校验和
        working-directory: dist
        shell: bash
        run: |
          set -euo pipefail
          rm -f checksums.txt
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: zhconv-go ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          body: |
            ## zhconv-go ${{ steps.meta.outputs.tag }}

            纯 Go 繁体 → 简体转换库 / CLI。

            ### 安装库
            ```bash
            go get github.com/xylplm/zhconv-go@${{ steps.meta.outputs.tag }}
            ```

            ### 安装 CLI
            ```bash
            go install github.com/xylplm/zhconv-go/cmd/zhconv@${{ steps.meta.outputs.tag }}
            ```

            或下载下方对应平台压缩包，校验见 `checksums.txt`。

            ### 快速使用
            ```go
            import "github.com/xylplm/zhconv-go"
            _ = zhconv.ToSimplified("軟體與網路連線")
            ```
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
